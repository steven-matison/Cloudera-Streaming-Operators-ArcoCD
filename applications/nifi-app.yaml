apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudera-nifi
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/steven-matison/Cloudera-Streaming-Operators-ArcoCD.git
    targetRevision: HEAD
    path: nifi
  destination:
    server: https://kubernetes.default.svc
    namespace: cfm-streaming
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true